    <!-- Share + search preview. Without these, a link to the app pasted into a DM or a search result was
         a bare "RDM" with no description or image; RDM markets on Instagram, so shared links matter.
         (Anthony, 2026-07-22) -->

    <!-- theme-color = the app's bottom-nav colour (#14282e / --nav-bg), NOT the page background.
         Proven by two device screenshots (Anthony, 2026-07-23): Chrome for Android tints the bottom
         SYSTEM navigation bar from THIS meta tag, and with it set to the page bg (#234048) that OS bar
         did not match the app's own #14282e bottom bar. Matching it here makes them line up in Chrome.
         Chrome no longer tints the TOP toolbar from theme-color in dark mode (it stays its own near
         black in the screenshots), so pointing this at the nav colour costs nothing up top.
         Caveat that no web page can fix: other browsers derive the OS bar differently (Firefox renders
         it near black regardless), so a guaranteed match on every browser only comes from the installed
         build, where the manifest theme_color (also #14282e) drives the native navigationBarColor. -->
    <meta name="theme-color" content="#14282e" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- iOS ignores the manifest's icons and uses this one. Generated by dev/make-icons.js: the logo on
         the brand blue with room around it, rather than the bare artwork edge to edge. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- Painted BEFORE any stylesheet or script loads, so the browser never shows its default white.
         The app background lives in index.css, which only arrives with the JS bundle. -->
    <style>
      /* The ROOT background is #14282e, the app's bottom-nav colour, NOT the #234048 dim-average that
         the visible surfaces use. Chrome on Android tints the bottom system navigation bar from the
         page's root background, so this is what makes that OS bar match the app's own bottom bar
         (Anthony's screenshot, 2026-07-23). It must be set here too, not only in index.css, so the OS
         bar is right from the first paint before the CSS bundle loads. The root is never itself visible
         (the #boot splash below, then the .shell, both paint the #234048 dimmed brand image over it), so
         the visible load colour is still #234048 throughout — only the OS-bar sample uses #14282e. */
      html { background-color: #14282e; color-scheme: dark; }
      body { margin: 0; background-color: #14282e; }

      /* The launch screen lives in the HTML, not in React, so it paints on the FIRST frame — at the same
         moment as the background, before a single byte of JS has run. Built as a React component it
         couldn't appear until the bundle downloaded and mounted, which left a beat of bare dark first.
         Everything here is self-contained (no CSS bundle, no webfont) for the same reason.
         React removes it when the app is ready — see dismissBootSplash() in src/main.jsx. */
      #boot {
        position: fixed; inset: 0; z-index: 100;
        display: grid; place-items: center;
        background-color: #234048;
        /* the identical layer the app shell uses (.shell in App.css), so when this fades there is
           literally nothing to see change behind it. This drifted out of sync once before — .shell's
           dim moved from a 0.40/0.52 gradient to a flat 0.72 and back down to 0.62, and this hard-coded
           copy was never updated, so the boot splash and the app it hands off to were dimmed
           differently. If you change .shell's dim again, update this line too. (Anthony, 2026-07-23) */
        background-image: linear-gradient(rgba(20,18,22,.62), rgba(20,18,22,.62)), url(/rdm-bg.png);
        background-size: cover; background-position: center;
        opacity: 1; transition: opacity 420ms ease;
      }
      #boot.is-leaving { opacity: 0; pointer-events: none; }
      #boot .b-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
      #boot img {
        width: 120px; height: 120px; border-radius: 28px;
        border: 3px solid #000; box-shadow: 0 6px 18px rgba(0,0,0,.35);
        animation: b-rise .5s cubic-bezier(.2,.8,.2,1) both;
      }
      #boot .b-name {
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        font-family: Ubuntu, system-ui, sans-serif; text-transform: uppercase;
        color: #fff; font-weight: 700; font-size: 15px; letter-spacing: 3.4px; line-height: 1.3;
        text-shadow: 0 2px 6px rgba(0,0,0,.45);
        animation: b-rise .5s cubic-bezier(.2,.8,.2,1) .06s both;
      }
      #boot .b-bar {
        width: 168px; height: 5px; margin-top: 6px; overflow: hidden;
        border-radius: 999px; background: rgba(255,255,255,.18);
      }
      #boot .b-bar i {
        display: block; width: 42%; height: 100%; border-radius: 999px; background: #06aeb9;
        animation: b-sweep 1.05s ease-in-out infinite;
      }
      #boot.is-leaving img { transform: scale(1.04); transition: transform 420ms ease; }
      @keyframes b-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      @keyframes b-sweep { 0% { transform: translateX(-115%); } 100% { transform: translateX(255%); } }
      @media (prefers-reduced-motion: reduce) {
        #boot img, #boot .b-name { animation: none; }
        #boot .b-bar i { animation: none; width: 100%; opacity: .7; }
        #boot.is-leaving img { transform: none; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-BNPllgTi.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-v6gdmPz3.css">

  <body>
    <div id="boot">
      <div class="b-wrap">
        <img src="/rdm-logo.png" alt="" />
        <div class="b-name"><span>Rudimental</span><span>Drumming</span><span>Mastery</span></div>
        <div class="b-bar" role="status" aria-label="Loading"><i></i></div>
      </div>
    </div>
    <div id="root"></div>
